name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Print tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build Swift package
        run: swift build --product LinguistMac

      - name: Run Swift package tests
        run: swift test

      - name: Build app scheme with xcodebuild
        run: |
          xcodebuild \
            -scheme LinguistMac \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/LinguistMacDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test package scheme with xcodebuild
        run: |
          xcodebuild \
            -scheme LinguistMac-Package \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/LinguistMacDerivedDataTests" \
            CODE_SIGNING_ALLOWED=NO \
            test

  package-unsigned-app:
    name: Package unsigned app
    needs: build-and-test
    runs-on: macos-15
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build app bundle
        run: ./script/build_and_run.sh --package

      - name: Archive unsigned app bundle
        run: ditto -c -k --keepParent dist/LinguistMac.app dist/LinguistMac-unsigned.zip

      - name: Upload unsigned app artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinguistMac-unsigned
          path: dist/LinguistMac-unsigned.zip
          if-no-files-found: error
